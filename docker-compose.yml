services:
  analytics-service:
    build: .
    container_name: analytics-service
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8006:8006"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8006/health/live', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
